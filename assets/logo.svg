<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="tile"><rect width="512" height="512" rx="116"/></clipPath>
  </defs>

  <!-- sage tile -->
  <g clip-path="url(#tile)">
    <rect width="512" height="512" fill="#9DBA8C"/>
    <!-- faint topographic texture -->
    <g stroke="#8CAA7A" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round">
      <path d="M-20 96 C 90 60, 150 150, 256 110 S 430 60, 540 120"/>
      <path d="M-20 170 C 100 140, 150 220, 256 188 S 440 150, 540 196"/>
      <path d="M-20 372 C 90 340, 160 420, 256 386 S 430 344, 540 396"/>
      <path d="M-20 444 C 110 410, 150 486, 256 452 S 440 416, 540 462"/>
    </g>
  </g>

  <!-- steam -->
  <g stroke="#FFFFFF" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.95">
    <path d="M300 196 C 282 176, 318 164, 300 142 C 286 124, 314 114, 302 96"/>
    <path d="M340 206 C 326 188, 356 178, 340 158"/>
  </g>

  <!-- lid -->
  <g fill="#FFFFFF">
    <g transform="rotate(-7 256 222)">
      <ellipse cx="256" cy="222" rx="120" ry="27"/>
      <rect x="234" y="190" width="44" height="15" rx="7.5"/>
    </g>
  </g>

  <!-- pot body + rim + handles -->
  <g fill="#FFFFFF">
    <rect x="146" y="250" width="220" height="30" rx="13"/>
    <rect x="118" y="256" width="36" height="20" rx="10"/>
    <rect x="358" y="256" width="36" height="20" rx="10"/>
    <path d="M160 280 L352 280 L341 360 Q336 386 309 386 L203 386 Q176 386 171 360 Z"/>
